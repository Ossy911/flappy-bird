<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Flap - Premium Bird Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        :root {
            --primary: #FFD700;
            --secondary: #4CAF50;
            --accent: #FF5722;
            --bg-top: #4facfe;
            --bg-bottom: #00f2fe;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            background: #111;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            background: transparent;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            border-radius: 20px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 30px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 85%;
            transform: scale(1);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .btn {
            background: var(--primary);
            color: #333;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        #score-display {
            position: absolute;
            top: 2rem;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 4rem;
            font-weight: 700;
            z-index: 5;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .game-over-score {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #best-score {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        .developer {
            font-size: 0.85rem;
            margin-top: 1.5rem;
            opacity: 0.8;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        #coin-hud {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            color: #FFD700;
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        #coin-hud::before {
            content: 'C';
            display: inline-block;
            background: #FFD700;
            color: #333;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            font-size: 1rem;
            font-weight: 900;
            border: 2px solid #DAA520;
        }

        .shop-btn {
            background: var(--secondary);
            margin-top: 10px;
        }

        .daily-btn {
            background: #9C27B0;
            color: white;
            margin-top: 10px;
        }

        #shop-screen {
            z-index: 20;
        }

        #shop-screen .card {
            max-width: 95%;
            padding: 1.5rem;
            max-height: 80vh;
            overflow-y: auto;
            touch-action: pan-y;
        }

        .toast {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(244, 67, 54, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            width: max-content;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .skin-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .skin-preview {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: relative;
        }

        .skin-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .skin-action {
            width: 100%;
            padding: 5px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-buy { background: var(--primary); color: #333; }
        .btn-equip { background: var(--secondary); color: white; }
        .btn-equipped { background: rgba(255,255,255,0.2); color: white; cursor: default; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">0</div>
        <div id="coin-hud">0</div>

        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <div class="card">
                <h1>Sky Flap</h1>
                <p>Tap to soar through the gaps!</p>
                <button id="start-btn" class="btn">Start Game</button>
                <button id="open-shop-btn" class="btn shop-btn">Open Shop</button>
                <button id="daily-btn" class="btn daily-btn">Daily Gift</button>
                <div class="developer">Created by Osita Daniel Ezenwoye</div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="overlay hidden">
            <div class="card">
                <h1>Game Over</h1>
                <div class="game-over-score">Score: <span id="final-score">0</span></div>
                <button id="restart-btn" class="btn">Play Again</button>
                <button id="game-over-shop-btn" class="btn shop-btn">Shop</button>
                <div id="best-score">Best: <span id="high-score">0</span></div>
                <div class="developer">Made with â¤ï¸ by Osita Daniel Ezenwoye</div>
            </div>
        </div>

        <!-- Shop Screen -->
        <div id="shop-screen" class="overlay hidden">
            <div class="card">
                <h2>Skin Shop</h2>
                <p style="margin-bottom: 1rem;">Balance: <span id="shop-balance">0</span> Coins</p>
                <div class="shop-grid" id="shop-grid">
                    <!-- Items will be injected here -->
                </div>
                <button id="close-shop-btn" class="btn">Close</button>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast">Not enough coins!</div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreLabel = document.getElementById('final-score');
        const highScoreLabel = document.getElementById('high-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const coinHud = document.getElementById('coin-hud');
        const shopScreen = document.getElementById('shop-screen');
        const shopGrid = document.getElementById('shop-grid');
        const shopBalance = document.getElementById('shop-balance');

        // Audio Context for sound effects
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            flap: () => playSound(400, 'triangle', 0.1),
            score: () => {
                playSound(600, 'sine', 0.1);
                setTimeout(() => playSound(800, 'sine', 0.1), 50);
            },
            hit: () => playSound(150, 'sawtooth', 0.3, 0.2),
            coin: () => {
                playSound(1200, 'sine', 0.1, 0.1);
                setTimeout(() => playSound(1600, 'sine', 0.15, 0.1), 100);
            },
            buy: () => playSound(800, 'square', 0.2, 0.1),
            thunder: () => {
                playSound(150, 'sawtooth', 0.5, 0.2);
                setTimeout(() => playSound(100, 'square', 1.0, 0.3), 100);
            }
        };

        // Game Data & State Persistence
        const SKINS = {
            'Default': { id: 'Default', type: 'male', body: '#FFD700', wing: 'white', beak: '#FF5722', price: 0 },
            'Okenwa': { id: 'Okenwa', type: 'male', body: '#2196F3', wing: '#90CAF9', beak: '#FF9800', price: 50 },
            'Kosi': { id: 'Kosi', type: 'male', body: '#4CAF50', wing: '#A5D6A7', beak: '#FFC107', price: 50 },
            'Michael': { id: 'Michael', type: 'male', body: '#9C27B0', wing: '#E1BEE7', beak: '#FFEB3B', price: 100 },
            'Stephen': { id: 'Stephen', type: 'male', body: '#FF9800', wing: '#FFE082', beak: '#F44336', price: 100 },
            'Nneoma': { id: 'Nneoma', type: 'female', body: '#E91E63', wing: '#F48FB1', beak: '#FFEB3B', price: 50 },
            'Oma': { id: 'Oma', type: 'female', body: '#00BCD4', wing: '#B2EBF2', beak: '#FF9800', price: 50 },
            'Sunshine': { id: 'Sunshine', type: 'female', body: '#FFEB3B', wing: '#FFF9C4', beak: '#FF5722', price: 100 },
            'Cassandra': { id: 'Cassandra', type: 'female', body: '#8BC34A', wing: '#DCEDC8', beak: '#FF9800', price: 100 },
            'Michaella': { id: 'Michaella', type: 'female', body: '#F44336', wing: '#FFCDD2', beak: '#FFC107', price: 150 }
        };

        let playerCoins = parseInt(localStorage.getItem('flappy_coins')) || 0;
        let unlockedSkins = JSON.parse(localStorage.getItem('flappy_skins')) || ['Default'];
        let currentSkin = localStorage.getItem('flappy_current_skin') || 'Default';

        function saveProgress() {
            localStorage.setItem('flappy_coins', playerCoins);
            localStorage.setItem('flappy_skins', JSON.stringify(unlockedSkins));
            localStorage.setItem('flappy_current_skin', currentSkin);
            coinHud.textContent = playerCoins;
        }
        saveProgress();

        // Game Constants
        let GAME_WIDTH, GAME_HEIGHT;
        const GRAVITY = 0.25;
        const FLAP_STRENGTH = -5;
        const PIPE_WIDTH = 60;
        const PIPE_SPAWN_RATE = 100; // frames
        const INITIAL_PIPE_GAP = 160;
        const INITIAL_PIPE_SPEED = 2.5;

        // Game State
        let bird, pipes, score, highScore = 0, frameCount, gameActive = false, pipeSpeed, pipeGap, shakeFrames = 0;

        function resize() {
            const container = document.getElementById('game-container');
            GAME_WIDTH = container.clientWidth;
            GAME_HEIGHT = container.clientHeight;
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
        }

        window.addEventListener('resize', resize);
        resize();

        class Bird {
            constructor() {
                this.x = GAME_WIDTH * 0.25;
                this.y = GAME_HEIGHT / 2;
                this.radius = 16;
                this.velocity = 0;
                this.rotation = 0;
                this.dashCooldown = 0;
                this.skin = SKINS[currentSkin];
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Body
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.skin.body;
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Eye
                ctx.beginPath();
                ctx.arc(8, -4, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(9, -4, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'black';
                ctx.fill();

                // Female Bow (if female skin)
                if (this.skin.type === 'female') {
                    ctx.fillStyle = '#E91E63';
                    ctx.beginPath();
                    ctx.moveTo(0, -14); ctx.lineTo(-6, -20); ctx.lineTo(-6, -10); ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(0, -14); ctx.lineTo(6, -20); ctx.lineTo(6, -10); ctx.fill();
                    ctx.beginPath();
                    ctx.arc(0, -14, 2, 0, Math.PI*2); ctx.fillStyle = 'white'; ctx.fill();
                }

                // Wing
                ctx.beginPath();
                ctx.ellipse(-6, 2, 8, 5, Math.PI / 4, 0, Math.PI * 2);
                ctx.fillStyle = this.skin.wing;
                ctx.fill();
                ctx.stroke();

                // Beak
                ctx.beginPath();
                ctx.moveTo(12, 0);
                ctx.lineTo(20, 4);
                ctx.lineTo(12, 8);
                ctx.fillStyle = this.skin.beak;
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.velocity += GRAVITY;
                this.y += this.velocity;
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, this.velocity * 0.1));

                if (this.y + this.radius > GAME_HEIGHT) {
                    this.y = GAME_HEIGHT - this.radius;
                    gameOver();
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            }

            flap() {
                this.velocity = FLAP_STRENGTH;
                this.dashCooldown = Math.max(0, this.dashCooldown - 1);
                sounds.flap();
            }
        }

        class Pipe {
            constructor() {
                this.x = GAME_WIDTH;
                const minGapTop = 50;
                const maxGapTop = GAME_HEIGHT - pipeGap - 50;
                if (maxGapTop <= minGapTop) {
                    this.gapTop = minGapTop;
                } else {
                    if (pipes && pipes.length > 0) {
                        const lastPipe = pipes[pipes.length - 1];
                        const maxVariation = 130;
                        const constrainedMin = Math.max(minGapTop, lastPipe.gapTop - maxVariation);
                        const constrainedMax = Math.min(maxGapTop, lastPipe.gapTop + maxVariation);
                        this.gapTop = Math.random() * (constrainedMax - constrainedMin) + constrainedMin;
                    } else {
                        this.gapTop = Math.random() * (maxGapTop - minGapTop) + minGapTop;
                    }
                }
                this.passed = false;
                this.vy = (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.5);
                this.minGapTop = 50;
                this.maxGapTop = GAME_HEIGHT - pipeGap - 50;
            }

            draw() {
                ctx.fillStyle = '#4CAF50';
                ctx.strokeStyle = '#2E7D32';
                ctx.lineWidth = 3;

                // Top Pipe
                this.drawRect(this.x, 0, PIPE_WIDTH, this.gapTop);
                // Bottom Pipe
                this.drawRect(this.x, this.gapTop + pipeGap, PIPE_WIDTH, GAME_HEIGHT - (this.gapTop + pipeGap));
            }

            drawRect(x, y, w, h) {
                ctx.fillRect(x, y, w, h);
                ctx.strokeRect(x, y, w, h);
                
                // Pipe Cap
                const capHeight = 20;
                const capOffset = 5;
                if (y === 0) {
                    // Top pipe cap
                    ctx.fillRect(x - capOffset, h - capHeight, w + capOffset * 2, capHeight);
                    ctx.strokeRect(x - capOffset, h - capHeight, w + capOffset * 2, capHeight);
                } else {
                    // Bottom pipe cap
                    ctx.fillRect(x - capOffset, y, w + capOffset * 2, capHeight);
                    ctx.strokeRect(x - capOffset, y, w + capOffset * 2, capHeight);
                }
            }

            update() {
                this.x -= pipeSpeed;
                if (score >= 5) {
                    this.gapTop += this.vy;
                    if (this.gapTop <= this.minGapTop || this.gapTop >= this.maxGapTop) this.vy *= -1;
                }
            }

            isColliding(bird) {
                const birdLeft = bird.x - bird.radius + 4;
                const birdRight = bird.x + bird.radius - 4;
                const birdTop = bird.y - bird.radius + 4;
                const birdBottom = bird.y + bird.radius - 4;

                // Collision with main pipe body
                const hitBody = (birdRight > this.x && birdLeft < this.x + PIPE_WIDTH) && 
                                (birdTop < this.gapTop || birdBottom > this.gapTop + pipeGap);

                // Collision with pipe caps (which are slightly wider)
                const capOffset = 5;
                const capHeight = 20;
                
                const hitTopCap = (birdRight > this.x - capOffset && birdLeft < this.x + PIPE_WIDTH + capOffset) && 
                                  (birdTop < this.gapTop && birdBottom > this.gapTop - capHeight);
                                  
                const hitBottomCap = (birdRight > this.x - capOffset && birdLeft < this.x + PIPE_WIDTH + capOffset) && 
                                     (birdBottom > this.gapTop + pipeGap && birdTop < this.gapTop + pipeGap + capHeight);

                return hitBody || hitTopCap || hitBottomCap;
            }
        }

        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 12;
                this.rotation = 0;
                this.dashCooldown = 0;
                this.collected = false;
            }

            update() {
                this.x -= pipeSpeed;
                if (score >= 5) {
                    this.gapTop += this.vy;
                    if (this.gapTop <= this.minGapTop || this.gapTop >= this.maxGapTop) this.vy *= -1;
                }
                this.rotation += 0.1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                // pseudo-3D spin effect using scale
                ctx.scale(Math.cos(this.rotation), 1);
                
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                ctx.strokeStyle = '#DAA520';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#DAA520';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('C', 0, 1);
                
                ctx.restore();
            }

            isColliding(bird) {
                const dx = this.x - bird.x;
                const dy = this.y - bird.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                return distance < this.radius + bird.radius;
            }
        }

        let inGameCoins = [];

        function init() {
            bird = new Bird();
            pipes = [];
            inGameCoins = [];
            score = 0;
            frameCount = 0;
            pipeSpeed = INITIAL_PIPE_SPEED;
            pipeGap = INITIAL_PIPE_GAP;
            scoreDisplay.textContent = score;
            coinHud.textContent = playerCoins;
        }

        // --- Environment & Weather ---
        const CYCLES = [
            { name: 'Morning', top: '#ff9a9e', bottom: '#fecfef' },
            { name: 'Day', top: '#4facfe', bottom: '#00f2fe' },
            { name: 'Evening', top: '#fa709a', bottom: '#fee140' },
            { name: 'Night', top: '#141e30', bottom: '#243b55' }
        ];
        
        let globalTime = 0;
        let currentWeather = 'CLEAR';
        let envParticles = [];
        let stars = [];
        let lightningFlash = 0;
        let collisionParticles = [];

        for (let i = 0; i < 50; i++) {
            stars.push({ x: Math.random() * 500, y: Math.random() * 800, radius: Math.random() * 1.5, alpha: Math.random() });
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function lerpColor(c1, c2, t) {
            const r1 = hexToRgb(c1), r2 = hexToRgb(c2);
            return `rgb(${Math.round(r1.r + (r2.r - r1.r) * t)}, ${Math.round(r1.g + (r2.g - r1.g) * t)}, ${Math.round(r1.b + (r2.b - r1.b) * t)})`;
        }

        function updateEnvironment() {
            globalTime++;
            if (globalTime % 1000 === 0) {
                const r = Math.random();
                if (r < 0.4) currentWeather = 'CLEAR';
                else if (r < 0.6) currentWeather = 'RAIN';
                else if (r < 0.8) currentWeather = 'STORM';
                else currentWeather = 'SNOW';
            }

            if (currentWeather === 'STORM' && Math.random() < 0.005 && lightningFlash <= 0) {
                lightningFlash = 1.0;
                sounds.thunder();
            }
            if (lightningFlash > 0) {
                lightningFlash -= 0.05;
            }

            if ((currentWeather === 'RAIN' || currentWeather === 'STORM') && globalTime % 2 === 0) {
                envParticles.push({ x: Math.random() * GAME_WIDTH, y: -10, type: 'RAIN', vy: 10 + Math.random() * 5, length: 10 + Math.random() * 10 });
            } else if (currentWeather === 'SNOW' && globalTime % 10 === 0) {
                envParticles.push({ x: Math.random() * GAME_WIDTH, y: -10, type: 'SNOW', vy: 1 + Math.random() * 2, vx: -1 + Math.random() * 2, radius: 1 + Math.random() * 2 });
            }
        }

        function drawBackground() {
            const cycleDuration = 3600;
            const phase = (globalTime % cycleDuration) / cycleDuration;
            const cycleIndex = Math.floor(phase * 4);
            const nextIndex = (cycleIndex + 1) % 4;
            const t = (phase * 4) % 1;

            const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            gradient.addColorStop(0, lerpColor(CYCLES[cycleIndex].top, CYCLES[nextIndex].top, t));
            gradient.addColorStop(1, lerpColor(CYCLES[cycleIndex].bottom, CYCLES[nextIndex].bottom, t));
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            if (cycleIndex === 3 || (cycleIndex === 2 && t > 0.5) || (cycleIndex === 0 && t < 0.5)) {
                ctx.fillStyle = 'white';
                stars.forEach(star => {
                    ctx.globalAlpha = star.alpha * (Math.sin(globalTime * 0.05 + star.x) * 0.5 + 0.5);
                    ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2); ctx.fill();
                });
                ctx.globalAlpha = 1.0;
            }

            // Draw Parallax Mountains
            ctx.fillStyle = cycleIndex === 3 ? '#1a2a42' : '#7cb342';
            for(let i=0; i<5; i++) {
                const mx = ((GAME_WIDTH + 300) * ((0.1 + i * 0.25 + globalTime * 0.002) % 1)) - 150;
                ctx.beginPath();
                ctx.moveTo(mx - 150, GAME_HEIGHT);
                ctx.lineTo(mx, GAME_HEIGHT - 200 - (i%2)*50);
                ctx.lineTo(mx + 150, GAME_HEIGHT);
                ctx.fill();
            }

            // Draw clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            const cloudT = globalTime * 0.01;
            for (let i = 0; i < 3; i++) {
                const x = ((GAME_WIDTH + 200) * ((0.2 + i * 0.4 + cloudT * 0.1) % 1)) - 100;
                const y = 100 + i * 150;
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2); ctx.arc(x + 25, y - 10, 25, 0, Math.PI * 2); ctx.arc(x + 50, y, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw weather particles
            for (let i = envParticles.length - 1; i >= 0; i--) {
                let p = envParticles[i];
                if (p.type === 'RAIN') {
                    p.y += p.vy; p.x -= 2;
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - 2, p.y + p.length); ctx.stroke();
                } else if (p.type === 'SNOW') {
                    p.y += p.vy; p.x += Math.sin(globalTime * 0.05 + p.y * 0.01) + p.vx;
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                }
                if (p.y > GAME_HEIGHT || p.x < -20) envParticles.splice(i, 1);
            }

            if (lightningFlash > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${lightningFlash})`;
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            }
        }

        function startGame() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            init();
            gameActive = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            shopScreen.classList.add('hidden');
        }

        function gameOver() {
            shakeFrames = 20;
            if (!gameActive) return;
            gameActive = false;
            sounds.hit();
            for(let i=0; i<30; i++) collisionParticles.push({x: bird.x, y: bird.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 30});
            if (score > highScore) highScore = score;
            finalScoreLabel.textContent = score;
            highScoreLabel.textContent = highScore;
            gameOverScreen.classList.remove('hidden');
            saveProgress();
        }

        function updateDifficulty() {
            pipeSpeed = INITIAL_PIPE_SPEED + Math.floor(score / 5) * 0.2;
            pipeGap = Math.max(130, INITIAL_PIPE_GAP - Math.floor(score / 10) * 10);
        }

        function renderLoop() {
            updateEnvironment();
            if (shakeFrames > 0) {
                ctx.save();
                ctx.translate((Math.random()-0.5)*15, (Math.random()-0.5)*15);
            }
            drawBackground();

            if (shakeFrames > 0) {
                ctx.restore();
                shakeFrames--;
            }

            for(let i=collisionParticles.length-1; i>=0; i--) {
                let p = collisionParticles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                ctx.fillStyle = "rgba(255, 255, 255, )";
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) collisionParticles.splice(i, 1);
            }

            if (bird) {
                if (gameActive) bird.update();
                bird.draw();
            }

            if (gameActive) {
                const SPACING = 250;
                if (pipes.length === 0 || (GAME_WIDTH - pipes[pipes.length - 1].x) >= SPACING) {
                    let newPipe = new Pipe();
                    pipes.push(newPipe);
                    if (Math.random() > 0.5) {
                        inGameCoins.push(new Coin(newPipe.x + PIPE_WIDTH / 2, newPipe.gapTop + pipeGap / 2));
                    }
                }

                for (let i = inGameCoins.length - 1; i >= 0; i--) {
                    inGameCoins[i].update();
                    inGameCoins[i].draw();

                    if (!inGameCoins[i].collected && inGameCoins[i].isColliding(bird)) {
                        inGameCoins[i].collected = true;
                        playerCoins++;
                        coinHud.textContent = playerCoins;
                        sounds.coin();
                        inGameCoins.splice(i, 1);
                        continue;
                    }

                    if (inGameCoins[i].x + inGameCoins[i].radius < 0) {
                        inGameCoins.splice(i, 1);
                    }
                }

                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].update();
                    pipes[i].draw();

                    if (pipes[i].isColliding(bird)) {
                        gameOver();
                    }

                    if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
                        pipes[i].passed = true;
                        score++;
                        scoreDisplay.textContent = score;
                        sounds.score();
                        updateDifficulty();
                    }

                    if (pipes[i].x + PIPE_WIDTH < -20) {
                        pipes.splice(i, 1);
                    }
                }
                frameCount++;
            }

            requestAnimationFrame(renderLoop);
        }

        function handleAction(e) {
            if (e.target.closest('#shop-screen') || e.target.closest('.btn')) {
                return;
            }
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
            if (gameActive) {
                bird.flap();
            }
        }

        window.addEventListener('mousedown', handleAction);
        window.addEventListener('touchstart', handleAction, { passive: false });
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                if (gameActive) bird.flap();
            }
            if (gameActive && e.code === 'ShiftLeft' && bird.dashCooldown === 0) {
                pipeSpeed = INITIAL_PIPE_SPEED * 3;
                bird.dashCooldown = 3;
                setTimeout(() => { if(gameActive) updateDifficulty(); }, 500);
            }
        });

        // --- Shop Logic ---
        function renderShop() {
            shopBalance.textContent = playerCoins;
            shopGrid.innerHTML = '';
            
            Object.values(SKINS).forEach(skin => {
                const isUnlocked = unlockedSkins.includes(skin.id);
                const isEquipped = currentSkin === skin.id;
                
                const card = document.createElement('div');
                card.className = 'skin-card';
                
                let btnHtml = '';
                if (isEquipped) {
                    btnHtml = `<button class="skin-action btn-equipped" disabled>Equipped</button>`;
                } else if (isUnlocked) {
                    btnHtml = `<button class="skin-action btn-equip" onclick="equipSkin('${skin.id}')">Equip</button>`;
                } else {
                    btnHtml = `<button class="skin-action btn-buy" onclick="buySkin('${skin.id}')">${skin.price} Coins</button>`;
                }

                card.innerHTML = `
                    <div class="skin-preview" style="background: ${skin.body}; border: 3px solid ${skin.wing}">
                        ${skin.type === 'female' ? '<div style="position:absolute;top:-5px;left:18px;color:#E91E63;font-size:12px;">ðŸŽ€</div>' : ''}
                    </div>
                    <div class="skin-name">${skin.id}</div>
                    ${btnHtml}
                `;
                shopGrid.appendChild(card);
            });
        }

        window.equipSkin = function(id) {
            currentSkin = id;
            saveProgress();
            renderShop();
            if (!gameActive && bird) {
                bird.skin = SKINS[currentSkin];
            }
        };

        window.buySkin = function(id) {
            const skin = SKINS[id];
            if (playerCoins >= skin.price && !unlockedSkins.includes(id)) {
                playerCoins -= skin.price;
                unlockedSkins.push(id);
                sounds.buy();
                equipSkin(id);
            } else {
                showToast("Your coins aren't available for the purchase.");
            }
        };

        function claimDailyReward(e) {
            if (e) {
                if (e.type === 'touchstart') e.preventDefault();
                e.stopPropagation();
            }
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            const lastCheckin = localStorage.getItem('flappy_last_checkin');
            const today = new Date().toDateString();
            
            if (lastCheckin !== today) {
                playerCoins += 50;
                localStorage.setItem('flappy_last_checkin', today);
                saveProgress();
                sounds.coin();
                showToast("Daily Gift Claimed! +50 Coins");
            } else {
                showToast("Already claimed today! Come back tomorrow.");
            }
        }

        document.getElementById('daily-btn').addEventListener('click', claimDailyReward);
        document.getElementById('daily-btn').addEventListener('touchstart', claimDailyReward, { passive: false });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function openShop(e) {
            if (e) {
                if (e.type === 'touchstart') e.preventDefault();
                e.stopPropagation();
            }
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            shopScreen.classList.remove('hidden');
            renderShop();
        }

        function closeShop(e) {
            if (e) {
                if (e.type === 'touchstart') e.preventDefault();
                e.stopPropagation();
            }
            shopScreen.classList.add('hidden');
            // Show appropriate screen
            if (score === 0 && !gameActive) {
                startScreen.classList.remove('hidden');
            } else if (!gameActive) {
                gameOverScreen.classList.remove('hidden');
            }
        }

        document.getElementById('open-shop-btn').addEventListener('click', openShop);
        document.getElementById('open-shop-btn').addEventListener('touchstart', openShop, { passive: false });
        
        document.getElementById('game-over-shop-btn').addEventListener('click', openShop);
        document.getElementById('game-over-shop-btn').addEventListener('touchstart', openShop, { passive: false });

        document.getElementById('close-shop-btn').addEventListener('click', closeShop);
        document.getElementById('close-shop-btn').addEventListener('touchstart', closeShop, { passive: false });


        function handleButtonPress(e) {
            if (e.type === 'touchstart') e.preventDefault();
            e.stopPropagation();
            startGame();
        }

        startBtn.addEventListener('click', handleButtonPress);
        startBtn.addEventListener('touchstart', handleButtonPress, { passive: false });

        restartBtn.addEventListener('click', handleButtonPress);
        restartBtn.addEventListener('touchstart', handleButtonPress, { passive: false });

        // Initialize the single render loop
        bird = new Bird(); // Dummy bird for start screen
        renderLoop();

    </script>
</body>
</html>
